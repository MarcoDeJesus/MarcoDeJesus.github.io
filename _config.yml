# Site Settings
title: "Marco De Jesus — SDET & QA Automation"
description: "14+ years QA automation and SDET leadership. Recruiters choose B2B contractor (remote Mexico) or W2 FTE (US). Currently W2 on-site at Axos Bank, San Diego."
author: "Marco De Jesus"
email: "marco_dejesus@live.com"
url: "https://marcodejesus.github.io"
baseurl: ""

# Build Settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - enhanced_resume.pdf
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Sass/SCSS Settings
sass:
  style: compressed

# Collections
collections:
  projects:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Social Links
social:
  linkedin: "https://www.linkedin.com/in/marco-antonio-de-jesus-ciriaco/"
  github: "https://github.com/MarcoDeJesus/ecommerce-fullstack-automation-portfolio"
  email: "marco_dejesus@live.com"
  phone: "+1 858 933 4510"

# SEO
lang: en-US
google_analytics: ""

