<section class="hero" id="hero">
    <div class="container">
        <div class="hero-content">
            <div class="hero-text">
                <h1 class="hero-title">
                    <span class="hero-name">{{ site.data.contact.name | upcase }}</span>
                </h1>
                <p class="hero-subtitle">{{ site.data.contact.tagline }}</p>
                <p class="hero-location">📍 {{ site.data.contact.location }}</p>
                <p class="hero-contact-line">
                    <a href="tel:{{ site.data.contact.phone }}">📞 {{ site.data.contact.phone }}</a>
                    <span class="contact-sep">|</span>
                    <a href="mailto:{{ site.data.contact.email }}">✉️ {{ site.data.contact.email }}</a>
                    <span class="contact-sep">|</span>
                    <a href="{{ site.data.contact.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                </p>
                <div class="hero-highlight">
                    <div class="highlight-badge">
                        <span class="highlight-icon">🚀</span>
                        <span class="highlight-text">6-month backlog → eliminated in 4 weeks | API 40% → 95%</span>
                    </div>
                </div>
                <div class="hero-actions">
                    <a href="#contact" class="btn btn-primary">Get In Touch</a>
                    <a href="#experience" class="btn btn-secondary">View Engagements</a>
                    <a href="{{ site.data.contact.demo_url }}" class="btn btn-outline" target="_blank" rel="noopener noreferrer">Live Demo</a>
                    <a href="{{ site.data.contact.demo_repo_url }}" class="btn btn-outline" target="_blank" rel="noopener noreferrer">View Repo</a>
                </div>
            </div>
        </div>
    </div>
    <div class="hero-scroll">
        <a href="#value" class="scroll-indicator" aria-label="Scroll to value proposition">
            <span></span>
        </a>
    </div>
</section>
