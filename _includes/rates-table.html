<div class="rates-block">
    <h4 class="rates-heading">{{ site.data.engagement.heading }}</h4>
    <div class="table-wrapper">
        <table class="rates-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th>Rate (USD)</th>
                    <th>Best For</th>
                </tr>
            </thead>
            <tbody>
                {% for row in site.data.engagement.models %}
                <tr>
                    <td data-label="Model"><strong>{{ row.model }}</strong></td>
                    <td data-label="Rate">{{ row.rate }}</td>
                    <td data-label="Best For">{{ row.best_for }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <p class="payment-note">{{ site.data.engagement.payment_note }}</p>
</div>
